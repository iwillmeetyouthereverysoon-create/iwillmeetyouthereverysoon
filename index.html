<script>
  

  function getCenter(el) {
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width/2, y: r.top + r.height/2 };
  }

  function drawLines() {
    const svg = document.getElementById('lines-svg');
    svg.innerHTML = '';
    connections.forEach(([fromId, toId]) => {
      const fromEl = document.querySelector('[data-id="' + fromId + '"]');
      const toEl = document.querySelector('[data-id="' + toId + '"]');
      if (!fromEl || !toEl) return;
      const a = getCenter(fromEl), b = getCenter(toEl);
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
      line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
      line.setAttribute('stroke', 'rgba(255,255,255,0.3)');
      line.setAttribute('stroke-width', '2.5');
      line.setAttribute('stroke-dasharray', '4 4');
      svg.appendChild(line);
    });
  }

  function makeDraggable(el) {
    el.addEventListener('mousedown', e => {
      const r=el.getBoundingClientRect(), pr=el.parentElement.getBoundingClientRect();
      let sl=r.left-pr.left, st=r.top-pr.top, ox=e.clientX, oy=e.clientY, dragging=true;
      el.style.left=sl+'px'; el.style.top=st+'px';
      el.style.right='auto'; el.style.bottom='auto';
      el.style.zIndex=99;
      e.preventDefault();
      const onMove = ev => {
        if (!dragging) return;
        el.style.left=(sl+ev.clientX-ox)+'px';
        el.style.top=(st+ev.clientY-oy)+'px';
        drawLines();
      };
      const onUp = () => { dragging=false; document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  document.querySelectorAll('.file, .note').forEach(makeDraggable);
  window.addEventListener('load', drawLines);
  window.addEventListener('resize', drawLines);
</script>
